server {
  listen 8080;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  add_header X-Content-Type-Options nosniff always;
  add_header Referrer-Policy same-origin always;
  add_header Permissions-Policy "geolocation=(self)" always;
  add_header Cross-Origin-Opener-Policy same-origin always;
  add_header Content-Security-Policy "default-src 'self'; base-uri 'none'; frame-ancestors 'none'; object-src 'none'; script-src 'self' 'wasm-unsafe-eval'; img-src 'self' data: blob: https://*.openstreetmap.org https://*.blob.core.windows.net https://planetarycomputer.microsoft.com https://gibs.earthdata.nasa.gov https://*.cesium.com; connect-src 'self' http://localhost:8000 https://*.openstreetmap.org https://gibs.earthdata.nasa.gov https://*.cesium.com; style-src 'self' 'unsafe-inline'; worker-src 'self' blob:" always;

  location = /health {
    access_log off;
    default_type text/plain;
    return 200 "ok\n";
  }

  location /assets/ {
    try_files $uri =404;
    expires 1y;
    add_header Cache-Control "public, immutable";
  }

  location /cesium/ {
    try_files $uri =404;
    expires 1y;
    add_header Cache-Control "public, immutable";
  }

  location / {
    try_files $uri /index.html;
    add_header Cache-Control "no-store";
  }
}
