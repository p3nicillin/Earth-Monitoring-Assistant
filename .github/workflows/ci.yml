name: CI

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgis/postgis:17-3.5-alpine
        env:
          POSTGRES_DB: earth_monitor_test
          POSTGRES_USER: earth
          POSTGRES_PASSWORD: earth
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U earth -d earth_monitor_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 15
    env:
      DATABASE_URL: postgresql+asyncpg://earth:earth@localhost:5432/earth_monitor_test
      SECRET_KEY: ci-only-secret-with-at-least-32-characters
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: backend/pyproject.toml
      - run: python -m pip install --upgrade pip
      - run: pip install -e ".[dev]"
        working-directory: backend
      - run: alembic upgrade head
        working-directory: backend
      - run: ruff check app tests
        working-directory: backend
      - run: ruff format --check app tests
        working-directory: backend
      - run: mypy app
        working-directory: backend
      - run: pytest --cov=app --cov-report=term-missing --cov-fail-under=65
        working-directory: backend

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
        working-directory: frontend
      - run: npm run typecheck
        working-directory: frontend
      - run: npm test
        working-directory: frontend
      - run: npm run build
        working-directory: frontend

  container:
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - run: docker compose config --quiet
      - run: docker compose build
